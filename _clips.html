<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Letar — fal.ai clip library</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f1216;color:#e8ecf0;font-family:system-ui,sans-serif;padding:28px 32px 80px}
  h1{font-size:1.15rem;font-weight:700;letter-spacing:.02em;margin-bottom:4px}
  .sub{color:#8a95a2;font-size:.85rem;margin-bottom:24px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:22px}
  .card{background:#171c22;border:1px solid #232a33;border-radius:12px;overflow:hidden}
  video{width:100%;display:block;background:#000;aspect-ratio:16/9;object-fit:cover}
  .meta{padding:12px 14px}
  .name{font-weight:600;font-size:.95rem}
  .name b{color:#5ea0ff}
  .use{font-size:.72rem;color:#8a95a2;margin-top:3px}
  .tiers{font-size:.68rem;color:#5b6570;margin-top:8px;font-family:ui-monospace,monospace}
  .tiers a{color:#7aa7d8;text-decoration:none;margin-right:10px}
  .tiers a:hover{text-decoration:underline}
  .unused{color:#e0a94a}
</style>
</head>
<body>
  <h1>fal.ai clip library — Letar film</h1>
  <p class="sub">Playing the web (-hd) encode of each shot. Click the tier links to open the 720p draft (-t1) or the 1080p master (-final) in a new tab. Folder: assets/gen/</p>
  <div class="grid" id="grid"></div>
<script>
  const clips = [
    { key:'hero',      hd:'hero-hd.mp4',      use:'Film — opening jet in flight' },
    { key:'teardown',  hd:'teardown-hd.mp4',  use:'Film — “THE TEARDOWN”' },
    { key:'machining', hd:'machining-hd.mp4', use:'Film — “THE MACHINE”' },
    { key:'cmm',       hd:'cmm-hd.mp4',       use:'Film — “THE PROOF” (CMM)' },
    { key:'ret',       hd:'ret-hd.mp4',       use:'Film — “RETURN TO SERVICE”' },
    { key:'orbit',     hd:'orbit-hd.mp4',     use:'About page hero' },
    { key:'hangar',    hd:'hangar-t1.mp4',    use:'UNUSED — jet in a hangar', unused:true },
  ];
  const g = document.getElementById('grid');
  for (const c of clips) {
    const base = 'assets/gen/' + c.key;
    g.insertAdjacentHTML('beforeend', `
      <div class="card">
        <video src="${'assets/gen/'+c.hd}" controls muted loop playsinline preload="metadata"></video>
        <div class="meta">
          <div class="name"><b>${c.key}</b>${c.unused?' <span class="unused">· unused</span>':''}</div>
          <div class="use">${c.use}</div>
          <div class="tiers">tiers: <a href="${base}-t1.mp4" target="_blank">-t1 720p</a><a href="${base}-hd.mp4" target="_blank">-hd web</a><a href="${base}-final.mp4" target="_blank">-final 1080p</a></div>
        </div>
      </div>`);
  }
</script>
</body>
</html>
