<!doctype html>
<!-- DEV: footage review grid (unlinked). ?t=SECONDS seeks all clips. -->
<html><head><meta charset="utf-8"><title>shot review</title>
<style>
body{margin:0;background:#111;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-family:monospace}
figure{margin:0;position:relative}video{width:100%;display:block}
figcaption{position:absolute;top:6px;left:8px;color:#fff;font-size:13px;text-shadow:0 1px 3px #000}
.missing{color:#f66;padding:20px;font-size:13px}
</style></head><body>
<script>
// each row: 720p take (left) vs 1080p final (right)
const shots=['hero','orbit','teardown','machining','cmm','ret','hangar']
const t=parseFloat(new URLSearchParams(location.search).get('t')||'2.5')
let ready=0,total=0
for(const s of shots){
  for(const suffix of ['-t1','-final']){
    const f=document.createElement('figure')
    const v=document.createElement('video');v.src='assets/gen/'+s+suffix+'.mp4';v.muted=true;v.preload='auto'
    total++
    v.addEventListener('loadeddata',()=>{v.currentTime=t})
    v.addEventListener('seeked',()=>{ready++;if(ready>=total)document.title='READY'})
    v.addEventListener('error',()=>{f.innerHTML='<div class="missing">'+s+suffix+' missing</div>';ready++;if(ready>=total)document.title='READY'})
    const c=document.createElement('figcaption');c.textContent=s+suffix
    f.append(v,c);document.body.append(f)
  }
}
</script>
</body></html>
